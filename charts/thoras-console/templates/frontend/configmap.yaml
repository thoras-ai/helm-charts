---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thoras-console-frontend-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thoras-console.resourceLabels" (dict "root" . "component" .Values.consoleFrontend.labels) | nindent 4 }}
data:
  nginx.conf: |
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path       /tmp/proxy_temp;
      fastcgi_temp_path     /tmp/fastcgi_temp;
      uwsgi_temp_path       /tmp/uwsgi_temp;
      scgi_temp_path        /tmp/scgi_temp;

      include       mime.types;

      server {
        listen       {{ .Values.consoleFrontend.containerPort }};
        listen       [::]:{{ .Values.consoleFrontend.containerPort }} ipv6only=on;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html index.htm;

        location /api/ {
          proxy_pass http://thoras-console-api/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
          try_files $uri /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|map)$ {
          expires 1y;
          access_log off;
          add_header Cache-Control "public";
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
          root   /usr/share/nginx/html;
        }
      }
    }
