---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "thoras-console.resourceLabels" (dict "root" . "component" .Values.consoleFrontend.labels) | nindent 4 }}
  name: {{ .Values.consoleFrontend.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
imagePullSecrets:
{{- if .Values.imageCredentials.secretRef }}
  - name: {{ .Values.imageCredentials.secretRef }}
{{- else }}
  - name: thoras-console-secret-registry
{{- end }}
