---
apiVersion: v1
kind: Service
metadata:
  name: thoras-console-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: thoras-console-api
    {{- include "thoras-console.resourceLabels" (dict "root" . "component" .Values.consoleApi.labels) | nindent 4 }}
spec:
  ports:
  - name: http
    port: {{ .Values.consoleApi.port }}
    protocol: TCP
    targetPort: {{ .Values.consoleApi.containerPort }}
  selector:
    app: thoras-console-api
