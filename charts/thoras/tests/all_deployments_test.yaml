suite: All Deployments
templates:
  - "*/deployment.yaml"
set:
  # Enable all deployments
  thorasForecast:
    worker:
      enabled: true
  thorasMonitor:
    enabled: true
    unittesting: true
  thorasDashboard:
    unittesting: true
  thorasSlmAgent:
    enabled: true
tests:
  - it: Object type correct
    asserts:
      - isKind:
          of: Deployment
  - it: Ensure resource requests and limits set
    asserts:
      - exists:
          path: spec.template.spec.containers[*].resources.limits
      - exists:
          path: spec.template.spec.containers[*].resources.requests
  - it: Has correct tolerations
    set:
      tolerations:
        - key: "key"
          operator: "Equal"
          value: "value"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "key"
            operator: "Equal"
            value: "value"
            effect: "NoSchedule"
  - it: Has nodeSelector set when nodeSelector specified
    set:
      nodeSelector:
        color: green
    asserts:
      - isSubset:
          path: .spec.template.spec
          content:
            nodeSelector:
              color: green
  - it: Passes global env vars to all containers
    set:
      env:
        - name: CUSTOM_VAR
          value: "custom-value"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_VAR
            value: "custom-value"
  - it: Passes proxy env vars to all containers
    set:
      proxy:
        httpProxy: "http://proxy:3128"
        httpsProxy: "http://proxy:3128"
        noProxy: "localhost,127.0.0.1"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: "http://proxy:3128"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NO_PROXY
            value: "localhost,127.0.0.1"
  - it: Passes global podAnnotations to all deployments
    set:
      podAnnotations:
        linkerd.io/inject: enabled
    asserts:
      - equal:
          path: spec.template.metadata.annotations["linkerd.io/inject"]
          value: enabled
