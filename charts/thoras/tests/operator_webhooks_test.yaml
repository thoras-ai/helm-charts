suite: Operator Webhooks
templates:
  - operator/webhooks.yaml
tests:
  - it: Should exclude kube-system and kube-node-lease from all webhooks by default
    asserts:
      - contains:
          path: webhooks[0].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-system
      - contains:
          path: webhooks[0].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-node-lease
      - contains:
          path: webhooks[1].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-system
      - contains:
          path: webhooks[1].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-node-lease

  - it: Should omit namespaceSelector on all webhooks when set to null
    set:
      thorasOperator.webhooks.namespaceSelector: null
    asserts:
      - notExists:
          path: webhooks[0].namespaceSelector
      - notExists:
          path: webhooks[1].namespaceSelector

  - it: Should set reinvocationPolicy to IfNeeded on pods webhook and Never on scale webhook by default
    documentIndex: 0
    asserts:
      - equal:
          path: webhooks[0].reinvocationPolicy
          value: IfNeeded
      - equal:
          path: webhooks[1].reinvocationPolicy
          value: Never

  - it: Should allow overriding reinvocationPolicy on both webhooks
    documentIndex: 0
    set:
      thorasOperator.webhooks.reinvocationPolicy.pods: Never
      thorasOperator.webhooks.reinvocationPolicy.scale: IfNeeded
    asserts:
      - equal:
          path: webhooks[0].reinvocationPolicy
          value: Never
      - equal:
          path: webhooks[1].reinvocationPolicy
          value: IfNeeded
