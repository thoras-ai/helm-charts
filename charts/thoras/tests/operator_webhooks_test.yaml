suite: Operator Webhooks
templates:
  - operator/webhooks.yaml
tests:
  - it: Should exclude kube-system and kube-node-lease from all webhooks by default
    asserts:
      - contains:
          path: webhooks[0].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-system
      - contains:
          path: webhooks[0].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-node-lease
      - contains:
          path: webhooks[1].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-system
      - contains:
          path: webhooks[1].namespaceSelector.matchExpressions[?(@.key == 'kubernetes.io/metadata.name')].values
          content: kube-node-lease

  - it: Should omit namespaceSelector on all webhooks when set to null
    set:
      thorasOperator.webhooks.namespaceSelector: null
    asserts:
      - notExists:
          path: webhooks[0].namespaceSelector
      - notExists:
          path: webhooks[1].namespaceSelector
