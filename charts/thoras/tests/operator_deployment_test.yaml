suite: Operator
templates:
  - operator/deployment.yaml
tests:
  - it: Ensure MODEL_SKIP_CACHE not exists when reasoning is enabled
    set:
      thorasForecast:
        skipCache: true
    asserts:
      - equal:
          path: $.spec.template.spec.containers[0].env[?(@.name == 'MODEL_SKIP_CACHE')].value
          value: "true"
  - it: Has FORECAST_NODE_SELECTOR set when nodeSelector specified
    set:
      nodeSelector:
        color: green
        bestGame: sekiro
    asserts:
      - equal:
          path: .spec.template.spec.containers[0].env[?(@.name == 'FORECAST_NODE_SELECTOR')].value
          value: "bestGame:sekiro,color:green"
  ############################
  # Resource allocation
  ############################

  - it: Should not have annotations section when all conditions are false
    set:
      thorasOperator:
        prometheus:
          enabled: false
        podAnnotations: {}
    asserts:
      - notExists:
          path: spec.template.metadata.annotations
  - it: Should have annotations section when prometheus is enabled
    set:
      thorasOperator:
        prometheus:
          enabled: true
          port: 8080
    asserts:
      - exists:
          path: spec.template.metadata.annotations
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
  - it: Should have annotations section when podAnnotations are set
    set:
      thorasOperator:
        prometheus:
          enabled: false
        podAnnotations:
          custom-annotation: "test-value"
    asserts:
      - exists:
          path: spec.template.metadata.annotations
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: "test-value"
  - it: Should enable request and limit overrides
    set:
      thorasOperator:
        requests:
          memory: "512Mi"
          cpu: "500m"
          hugepages-1Gi: 2Gi
        limits:
          memory: "1Gi"
          cpu: "1"
          hugepages-1Gi: 2Gi
    asserts:
      - isSubset:
          path: spec.template.spec.containers[?(@.name == 'thoras-operator')].resources
          content:
            requests:
              memory: "512Mi"
              cpu: "500m"
              hugepages-1Gi: "2Gi"
            limits:
              memory: "1Gi"
              cpu: "1"
              hugepages-1Gi: "2Gi"
  - it: Can override resources block
    set:
      thorasOperator:
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
            hugepages-1Gi: "2Gi"
          limits:
            memory: "1Gi"
            cpu: "1"
            hugepages-1Gi: "2Gi"
    chart:
      version: "4.7.0"
    asserts:
      - isSubset:
          path: spec.template.spec.containers[?(@.name == 'thoras-operator')].resources
          content:
            requests:
              memory: "512Mi"
              cpu: "500m"
              hugepages-1Gi: "2Gi"
            limits:
              memory: "1Gi"
              cpu: "1"
              hugepages-1Gi: "2Gi"
  - it: Should set default utilization thresholds
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_OVERPROVISIONED_THRESHOLD')].value
          value: "60"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_UNDERPROVISIONED_THRESHOLD')].value
          value: "92"
  - it: Should override utilization thresholds
    set:
      utilizationThresholds:
        overprovisioned: 50
        underprovisioned: 85
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_OVERPROVISIONED_THRESHOLD')].value
          value: "50"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_UNDERPROVISIONED_THRESHOLD')].value
          value: "85"
  - it: Should set default postgresql connection-pool settings
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONNS')].value
          value: "10"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONN_IDLE_TIME')].value
          value: "5m"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONN_LIFETIME')].value
          value: "1h"
  - it: Should override postgresql settings per component
    set:
      thorasOperator:
        postgresql:
          maxConns: 50
          maxConnIdleTime: "10m"
          maxConnLifetime: "2h"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONNS')].value
          value: "50"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONN_IDLE_TIME')].value
          value: "10m"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONN_LIFETIME')].value
          value: "2h"
  - it: Should fall back to global postgresql defaults for unset overrides
    set:
      thorasOperator:
        postgresql:
          maxConns: 50
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONNS')].value
          value: "50"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONN_IDLE_TIME')].value
          value: "5m"
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POSTGRESQL_MAX_CONN_LIFETIME')].value
          value: "1h"
