suite: API Service Layer RBAC
templates:
  - api-server-v2/rbac.yaml
set:
  thorasVersion: TEST
  imageCredentials:
    secretRef: test-secret-registry
  thorasApiServerV2:
    rbac:
      create: true
tests:
  - it: Default matches snapshot
    chart:
      version: "4.7.0"
    asserts:
      - matchSnapshot: {}
  - it: thoras role includes configmap permissions
    chart:
      version: "4.7.0"
    asserts:
      - documentIndex: 4
        equal:
          path: rules[1]
          value:
            apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["get", "update", "patch"]
