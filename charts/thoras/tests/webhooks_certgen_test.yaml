suite: Webhook Certificate Generation
tests:
  ############################
  # Create Job Tests
  ############################
  - it: Creates mutating webhook patch job with correct configuration
    template: operator/webhooks-certgen-create.yaml
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install,pre-upgrade
      - contains:
          path: spec.template.spec.containers[0].args
          content: create
      - contains:
          path: spec.template.spec.containers[0].args
          content: --host=thoras-webhooks,thoras-webhooks.NAMESPACE.svc

  - it: Uses secretRef for imagePullSecrets when provided
    template: operator/webhooks-certgen-create.yaml
    set:
      imageCredentials:
        secretRef: "custom-registry-secret"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "custom-registry-secret"

  - it: Creates thoras-secret-registry-certgen imagePullSecret when password is set
    template: operator/webhooks-certgen-create.yaml
    set:
      imageCredentials:
        password: "test-password"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: thoras-secret-registry-certgen

  - it: Uses custom namespace from Release
    template: operator/webhooks-certgen-create.yaml
    release:
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
      - contains:
          path: spec.template.spec.containers[0].args
          content: --namespace=custom-namespace

  - it: Uses custom image tag
    template: operator/webhooks-certgen-create.yaml
    set:
      thorasOperator:
        webhookCertGen:
          imageTag: "v2.0.0"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: kube-webhook-certgen:v2.0.0$

  - it: Uses custom imagePullPolicy
    template: operator/webhooks-certgen-create.yaml
    set:
      imagePullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  ############################
  # Patch Jobs Tests
  ############################
  - it: Creates two patch jobs for mutating and validating webhooks
    template: operator/webhooks-certgen-patch.yaml
    asserts:
      - hasDocuments:
          count: 2

  - it: Creates mutating webhook patch job with correct configuration
    template: operator/webhooks-certgen-patch.yaml
    documentIndex: 0
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
      - contains:
          path: spec.template.spec.containers[0].args
          content: patch
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-name=pods.thoras.ai
      - contains:
          path: spec.template.spec.containers[0].args
          content: --patch-validating=false

  - it: Creates validating webhook patch job with correct configuration
    template: operator/webhooks-certgen-patch.yaml
    documentIndex: 1
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
      - contains:
          path: spec.template.spec.containers[0].args
          content: patch
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-name=validation.thoras.ai
      - contains:
          path: spec.template.spec.containers[0].args
          content: --patch-mutating=false

  - it: Patch jobs use secretRef for imagePullSecrets when provided
    template: operator/webhooks-certgen-patch.yaml
    set:
      imageCredentials:
        secretRef: "custom-registry-secret"
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "custom-registry-secret"

  - it: Patch jobs create thoras-secret-registry-certgen imagePullSecret when password is set
    template: operator/webhooks-certgen-patch.yaml
    set:
      imageCredentials:
        password: "test-password"
    documentIndex: 1
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: thoras-secret-registry-certgen

  - it: Patch jobs use custom namespace from Release
    template: operator/webhooks-certgen-patch.yaml
    release:
      namespace: custom-namespace
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
      - contains:
          path: spec.template.spec.containers[0].args
          content: --namespace=custom-namespace

  - it: Patch jobs use custom image tag
    template: operator/webhooks-certgen-patch.yaml
    set:
      thorasOperator:
        webhookCertGen:
          imageTag: "v2.0.0"
    documentIndex: 0
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: kube-webhook-certgen:v2.0.0$

  ############################
  # cert-manager mode
  ############################
  - it: Skips certgen create Job when cert-manager is enabled
    template: operator/webhooks-certgen-create.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen patch Jobs when cert-manager is enabled
    template: operator/webhooks-certgen-patch.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen ServiceAccount when cert-manager is enabled
    template: operator/webhooks-certgen-serviceaccount.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen ClusterRole when cert-manager is enabled
    template: operator/webhooks-certgen-clusterrole.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen ClusterRoleBinding when cert-manager is enabled
    template: operator/webhooks-certgen-clusterrolebinding.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen Role when cert-manager is enabled
    template: operator/webhooks-certgen-role.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen RoleBinding when cert-manager is enabled
    template: operator/webhooks-certgen-rolebinding.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen registry pull secret when cert-manager is enabled
    template: operator/webhooks-certgen-registry-secret.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
      imageCredentials.password: "test-password"
    asserts:
      - hasDocuments:
          count: 0

  - it: Skips certgen NetworkPolicy when cert-manager is enabled
    template: operator/webhooks-certgen-network-policy.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
      networkPolicy.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Omits cert-manager Issuer and Certificate by default
    template: operator/webhooks-certmanager.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: Creates self-signed Issuer and Certificate when cert-manager is enabled
    template: operator/webhooks-certmanager.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Issuer
        documentIndex: 0
      - equal:
          path: metadata.name
          value: thoras-webhooks-selfsigned
        documentIndex: 0
      - exists:
          path: spec.selfSigned
        documentIndex: 0
      - isKind:
          of: Certificate
        documentIndex: 1
      - equal:
          path: metadata.name
          value: thoras-tls-certs
        documentIndex: 1
      - equal:
          path: spec.secretName
          value: thoras-tls-certs
        documentIndex: 1
      - equal:
          path: spec.issuerRef.name
          value: thoras-webhooks-selfsigned
        documentIndex: 1
      - equal:
          path: spec.issuerRef.kind
          value: Issuer
        documentIndex: 1
      - contains:
          path: spec.dnsNames
          content: thoras-webhooks
        documentIndex: 1
      - contains:
          path: spec.dnsNames
          content: thoras-webhooks.NAMESPACE.svc
        documentIndex: 1

  - it: Annotates webhook configs with cert-manager inject-ca-from when enabled
    template: operator/webhooks.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
          value: NAMESPACE/thoras-tls-certs
        documentIndex: 0
      - equal:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
          value: NAMESPACE/thoras-tls-certs
        documentIndex: 1

  - it: Does not add inject-ca-from annotation when cert-manager is disabled
    template: operator/webhooks.yaml
    asserts:
      - notExists:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
        documentIndex: 0
      - notExists:
          path: metadata.annotations["cert-manager.io/inject-ca-from"]
        documentIndex: 1

  - it: Operator deployment volume uses tls.crt/tls.key keys when cert-manager is enabled
    template: operator/deployment.yaml
    set:
      thorasOperator.webhookCertGen.certManager.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes[?(@.name == 'tls')].secret.items
          content:
            key: tls.crt
            path: tls.crt
      - contains:
          path: spec.template.spec.volumes[?(@.name == 'tls')].secret.items
          content:
            key: tls.key
            path: tls.key
