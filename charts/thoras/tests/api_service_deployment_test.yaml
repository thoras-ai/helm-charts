suite: API Service Layer Deployment
templates:
  - api-server-v2/deployment.yaml
set:
  thorasMonitor:
    unittesting: true
tests:
  - it: Should set tolerations if specified
    set:
      tolerations:
        - key: "example-key"
          operator: "Exists"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "example-key"
            operator: "Exists"
            effect: "NoSchedule"
  - it: Should not have tolerations if not specified
    asserts:
      - notExists:
          path: spec.template.spec.tolerations
  - it: Ensure SERVICE_POD_LOG_LABEL is correct
    asserts:
      - equal:
          path: $.spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POD_LOG_LABEL')].value
          value: "app.kubernetes.io/name=thoras"
  - it: Should not have annotations section when all conditions are false
    set:
      podAnnotations: {}
      thorasApiServerV2:
        prometheus:
          enabled: false
        podAnnotations: {}
    asserts:
      - notExists:
          path: spec.template.metadata.annotations
  - it: Should have annotations section when only global podAnnotations are set
    set:
      podAnnotations:
        linkerd.io/inject: enabled
      thorasApiServerV2:
        prometheus:
          enabled: false
        podAnnotations: {}
    asserts:
      - exists:
          path: spec.template.metadata.annotations
      - equal:
          path: spec.template.metadata.annotations["linkerd.io/inject"]
          value: enabled
  - it: Component podAnnotations should override global for same key
    set:
      podAnnotations:
        linkerd.io/inject: enabled
      thorasApiServerV2:
        prometheus:
          enabled: false
        podAnnotations:
          linkerd.io/inject: disabled
    asserts:
      - equal:
          path: spec.template.metadata.annotations["linkerd.io/inject"]
          value: disabled
  - it: Should merge global and component podAnnotations
    set:
      podAnnotations:
        linkerd.io/inject: enabled
      thorasApiServerV2:
        prometheus:
          enabled: false
        podAnnotations:
          custom-annotation: test-value
    asserts:
      - equal:
          path: spec.template.metadata.annotations["linkerd.io/inject"]
          value: enabled
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: test-value
  - it: Should have annotations section when prometheus is enabled
    set:
      thorasApiServerV2:
        prometheus:
          enabled: true
    asserts:
      - exists:
          path: spec.template.metadata.annotations
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
  - it: Should have annotations section when podAnnotations are set
    set:
      thorasApiServerV2:
        prometheus:
          enabled: false
        podAnnotations:
          custom-annotation: "test-value"
    asserts:
      - exists:
          path: spec.template.metadata.annotations
      - equal:
          path: spec.template.metadata.annotations["custom-annotation"]
          value: "test-value"
  - it: Should ensure default extensionVersion is substring of default imageTag
    set:
      metricsCollector:
        timescale:
          extensionVersion: "2.26.1"
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].env[?(@.name == 'EXTENSION_VERSION')].value
          value: "2.26.1"
  - it: Should enable request and limit overrides
    set:
      thorasApiServerV2:
        requests:
          memory: "512Mi"
          cpu: "500m"
          hugepages-1Gi: 2Gi
        limits:
          memory: "1Gi"
          cpu: "1"
          hugepages-1Gi: 2Gi
    asserts:
      - isSubset:
          path: spec.template.spec.containers[?(@.name == 'thoras-api-server-v2')].resources
          content:
            requests:
              memory: "512Mi"
              cpu: "500m"
              hugepages-1Gi: "2Gi"
            limits:
              memory: "1Gi"
              cpu: "1"
              hugepages-1Gi: "2Gi"
  - it: Can override resources block
    set:
      thorasApiServerV2:
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
            hugepages-1Gi: "2Gi"
          limits:
            memory: "1Gi"
            cpu: "1"
            hugepages-1Gi: "2Gi"
    chart:
      version: "4.7.0"
    asserts:
      - isSubset:
          path: spec.template.spec.containers[?(@.name == 'thoras-api-server-v2')].resources
          content:
            requests:
              memory: "512Mi"
              cpu: "500m"
              hugepages-1Gi: "2Gi"
            limits:
              memory: "1Gi"
              cpu: "1"
              hugepages-1Gi: "2Gi"
  - it: Should set default podEligibilityMinRunningTime
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POD_ELIGIBILITY_MIN_RUNNING_TIME')].value
          value: "2m"
  - it: Should override podEligibilityMinRunningTime
    set:
      thorasForecast:
        podEligibilityMinRunningTime: "5m"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_POD_ELIGIBILITY_MIN_RUNNING_TIME')].value
          value: "5m"
  - it: Should set default SERVICE_MIN_LOOKBACK_TO_SCALE
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_MIN_LOOKBACK_TO_SCALE')].value
          value: "3h"
  - it: Should override SERVICE_MIN_LOOKBACK_TO_SCALE
    set:
      thorasForecast:
        minLookbackToScale: "12h"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_MIN_LOOKBACK_TO_SCALE')].value
          value: "12h"
  - it: Should default SERVICE_MIN_LOOKBACK_TO_SCALE when null
    set:
      thorasForecast:
        minLookbackToScale: null
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_MIN_LOOKBACK_TO_SCALE')].value
          value: "3h"
  - it: Should set SERVICE_BLOB_SERVICE_API_URL by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_BLOB_SERVICE_API_URL')].value
          value: "http://thoras-blob-api"
  - it: Should omit SERVICE_BLOB_SERVICE_API_URL when enableNoBlobApiServer is true
    set:
      featureFlags:
        enableNoBlobApiServer: true
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env[?(@.name == 'SERVICE_BLOB_SERVICE_API_URL')]
