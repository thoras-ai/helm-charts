---
thorasVersion: "4.104.5"
cluster:
  name: ""

imageCredentials:
  registry: "us-east4-docker.pkg.dev/thoras-registry/platform"
  username: "_json_key_base64"

  # Set the license key directly as a variable (or alternatively
  # use imageCredentials.secretRef to reference an existing secret
  password: ""

  # Reference a pre-existing secret in the Thoras namespace
  secretRef: ""
  imagePullSecretInDeployment: false

resourceQuota:
  enabled: false
  pods: 200
  cronjobs: 200
  jobs: 200

networkPolicy:
  enabled: false
  # flavor: "kubernetes" uses standard NetworkPolicy (networking.k8s.io/v1)
  # flavor: "cilium" uses CiliumNetworkPolicy (cilium.io/v2)
  flavor: kubernetes

imagePullPolicy: "IfNotPresent"

logLevel: info

# -- Additional environment variables that will be passed onto all Thoras components
env: []

# -- Proxy settings passed to all Thoras components
proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""

featureFlags:
  enableNodeDetailsCollector: true
  # When enabled, AST scale mode may be configured via API
  enableUpdateScaleModeApi: false
  thorasManageThoras:
    enabled: true
    # Recommendation Mode by default
    mode: "recommendation"
    updateMode: "in_place_or_recreate"
    db:
      updateMode: "in_place_or_recreate"
      # Look 4h ahead by default
      forecastBlocks: "4h0s"
      # Forecast once per hour by default
      forecastCron: "17 * * * *"
  enablePrometheusMetricScraping: false
  enablePgLargeObjectStorage: true
  enableNoBlobApiServer: false
  enableForecastQueueStats: false
  enableInformersStripManagedFields: true
  enableTypedInformers: true
  enableMemoryLimit: true
  enableDisruptionSchedulerWorker: false
  enableASTOwnerReference: true
  enableAstRecordMirroring: false

# Cost refresh batching configuration (shared by thorasApiServerV2 and thorasWorker)
costRefreshBatching:
  enabled: true
  batchSize: 200
  maxConcurrency: 5

# Enable Slack errors
slackErrorsEnabled: false

# Set Slack notification Webhook URL directly (or alternatively use
# use slackWebhookUrlSecretRef to reference an existing secret
slackWebhookUrl: ""

# If you'd like to reference an existing secret, use these two values
# to indicate the secret name and data key
slackWebhookUrlSecretRefName: ""
slackWebhookUrlSecretRefKey: ""

cloudSync:
  baseUrl: "https://console.thoras.ai"

  clusterKeyID: ""

  # Set cluster key directly (or alternatively use use clusterKeySecretRef to
  # reference an existing secret. Sync is disabled if no cluster key is
  # provided.
  clusterKey: ""

  # If you'd like to reference an existing secret, use these two values to
  # indicate the secret name and data key
  clusterKeySecretRefName: ""
  clusterKeySecretRefKey: ""

# External TimescaleDB configuration. When set, the chart skips deploying the
# in-cluster TimescaleDB and configures all components to use the external
# database instead. The TimescaleDB extension must be pre-installed and managed
# externally.
externalTimescale:
  # Full postgres DSN including the database name,
  # e.g. "postgres://user:password@host:5432/tsdb?sslmode=require"
  dsn: ""

  # Or reference a pre-existing Secret containing the DSN.
  # The secret key must contain the full postgres DSN including the database name.
  secretRefName: ""
  secretRefKey: ""

# Default PostgreSQL connection-pool settings for the api-server, operator,
# and worker. Each component can override any of these under its own
# `postgresql` block.
postgresql:
  # Maximum number of connections in the pool.
  maxConns: 20
  # Maximum amount of time a connection may sit idle before being closed.
  maxConnIdleTime: 5m
  # Maximum amount of time a connection may be reused before being closed.
  maxConnLifetime: 1h

rbac:
  namespaces: []

thorasOperator:
  replicas: 2
  # Overrides for the global `postgresql` connection-pool settings. Any field
  # left unset falls back to the corresponding `postgresql` default.
  postgresql:
    maxConns: ""
    maxConnIdleTime: ""
    maxConnLifetime: ""
  # Resource upperbound used when thorasManageThoras is enabled. Empty means
  # no upperbound. Use K8s resource.Quantity syntax (e.g. "2", "4Gi").
  upperbound:
    cpu: ""
    memory: ""
  # OOM remediation used when thorasManageThoras is enabled. Enabled by
  # default so that an OOM on a Thoras workload raises its memory floor via
  # the operator's standard OOM remediation flow. stabilization_window is a
  # duration string (e.g. "1h"); empty defers to the operator default of
  # max(forecast_interval, 1h).
  oom_remediation:
    enabled: true
    stabilization_window: ""
  serviceAccount:
    name: thoras-operator
  podAnnotations: {}
  labels: {}
  # PodDisruptionBudget. Defaults to maxUnavailable: 1 when neither field is set
  # below. minAvailable takes precedence if both are set.
  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable:
  service:
    annotations: {}
  # Specify the complete resources block (takes precedence if set)
  resources: {}
  # Legacy field for backward compatibility (used if resources is empty)
  limits:
    memory: 4Gi
  # Legacy field for backward compatibility (used if resources is empty)
  requests:
    cpu: 100m
    memory: 1Gi
  prometheus:
    enabled: true
    port: 9101
  pprof:
    enabled: false
  # Set to true to apply global affinity rules to this component
  useGlobalAffinity: true
  # Component-specific affinity (merged with global if useGlobalAffinity is true)
  affinity: {}
  # Webhook certificate generation configuration
  webhookCertGen:
    imageTag: v1.4.4
    # When enabled, cert-manager provisions the thoras-tls-certs secret and
    # injects the CA bundle into the webhook configurations. The bundled
    # kube-webhook-certgen Jobs (and their RBAC/NetworkPolicy/registry secret)
    # are skipped. Requires cert-manager to be installed in the cluster.
    certManager:
      enabled: false
  # namespaceSelector applied to all webhook configurations. Set to null when
  # using an admission enforcer (e.g. OPA Gatekeeper's admissionsenforcer) that
  # manages namespaceSelector itself, to avoid upgrade conflicts:
  #   thorasOperator.webhooks.namespaceSelector: null
  webhooks:
    namespaceSelector:
      matchExpressions:
        - key: "kubernetes.io/metadata.name"
          operator: NotIn
          values:
            - kube-system
            - kube-node-lease
    reinvocationPolicy:
      pods: IfNeeded
      scale: Never
  extraEgressRules: []

metricsCollector:
  # Resource upperbound used when thorasManageThoras is enabled. Empty means
  # no upperbound. Use K8s resource.Quantity syntax (e.g. "2", "4Gi").
  upperbound:
    cpu: ""
    memory: ""
  # OOM remediation used when thorasManageThoras is enabled. Enabled by
  # default so that an OOM on a Thoras workload raises its memory floor via
  # the operator's standard OOM remediation flow. stabilization_window is a
  # duration string (e.g. "1h"); empty defers to the operator default of
  # max(forecast_interval, 1h).
  oom_remediation:
    enabled: true
    stabilization_window: ""
  persistence:
    enabled: false
    volumeName: ""
    storageClassName: "efs-sc-thoras"
    accessMode: "ReadWriteOnce"
    createEFSStorageClass:
      fileSystemId: ""
    pvcStorageRequestSize: "3Gi"
  podAnnotations: {}
  labels: {}
  # PodDisruptionBudget. Defaults to maxUnavailable: 1 when neither field is set
  # below. minAvailable takes precedence if both are set.
  pdb:
    enabled: false
    maxUnavailable: 1
    # minAvailable:
  service:
    annotations: {}
  serviceAccount:
    name: thoras-collector
  init:
    imageTag: "3.23.3"
    # Specify the complete resources block (takes precedence if set)
    resources: {}
    # Legacy field for backward compatibility (used if resources is empty)
    limits:
      memory: "8192Mi"
    # Legacy field for backward compatibility (used if resources is empty)
    requests:
      cpu: "16m"
      memory: "32Mi"
  timescale:
    image: "timescaledb"
    imageTag: "2.27.0-pg16"
    extensionVersion: "2.27.0"
    name: timescale
    containerPort: 5432
    # Specify the complete resources block (takes precedence if set)
    resources: {}
    # Legacy field for backward compatibility (used if resources is empty)
    limits:
      memory: "16384Mi"
    # Legacy field for backward compatibility (used if resources is empty)
    requests:
      cpu: "1024m"
      memory: "3072Mi"
    config:
      enabled: false
      content: ""
    walRecovery:
      enabled: false
  blobService:
    logLevel: "info"
    pprof:
      enabled: false
    containerPort: 8080
    port: 80
    # Specify the complete resources block (takes precedence if set)
    resources: {}
    # Legacy field for backward compatibility (used if resources is empty)
    limits:
      memory: "8192Mi"
    # Legacy field for backward compatibility (used if resources is empty)
    requests:
      cpu: "16m"
      memory: "128Mi"
  # Set to true to apply global affinity rules to this component
  useGlobalAffinity: true
  # Component-specific affinity (merged with global if useGlobalAffinity is true)
  affinity: {}
  extraEgressRules: []

thorasApiServerV2:
  # Overrides for the global `postgresql` connection-pool settings. Any field
  # left unset falls back to the corresponding `postgresql` default.
  postgresql:
    maxConns: ""
    maxConnIdleTime: ""
    maxConnLifetime: ""
  # Resource upperbound used when thorasManageThoras is enabled. Empty means
  # no upperbound. Use K8s resource.Quantity syntax (e.g. "2", "4Gi").
  upperbound:
    cpu: ""
    memory: ""
  # OOM remediation used when thorasManageThoras is enabled. Enabled by
  # default so that an OOM on a Thoras workload raises its memory floor via
  # the operator's standard OOM remediation flow. stabilization_window is a
  # duration string (e.g. "1h"); empty defers to the operator default of
  # max(forecast_interval, 1h).
  oom_remediation:
    enabled: true
    stabilization_window: ""
  rbac:
    create: true
  serviceAccount:
    name: thoras-api
  containerPort: 8080
  podAnnotations: {}
  labels: {}
  # PodDisruptionBudget. Defaults to maxUnavailable: 1 when neither field is set
  # below. minAvailable takes precedence if both are set.
  pdb:
    enabled: true
    maxUnavailable: 1
    # minAvailable:
  service:
    annotations: {}
  replicas: 1
  # Specify the complete resources block (takes precedence if set)
  resources: {}
  # Legacy field for backward compatibility (used if resources is empty)
  limits:
    memory: 4Gi
  # Legacy field for backward compatibility (used if resources is empty)
  requests:
    cpu: 128m
    memory: 1Gi
  port: 80
  logLevel: "info"
  prometheus:
    enabled: true
  pprof:
    enabled: false
  enableViewCacheQueryLiveJoin: true
  # Set to true to apply global affinity rules to this component
  useGlobalAffinity: true
  # Component-specific affinity (merged with global if useGlobalAffinity is true)
  affinity: {}
  extraEgressRules: []

thorasWorker:
  enabled: true
  # Overrides for the global `postgresql` connection-pool settings. Any field
  # left unset falls back to the corresponding `postgresql` default.
  postgresql:
    maxConns: ""
    maxConnIdleTime: ""
    maxConnLifetime: ""
  # Resource upperbound used when thorasManageThoras is enabled. Empty means
  # no upperbound. Use K8s resource.Quantity syntax (e.g. "2", "4Gi").
  upperbound:
    cpu: ""
    memory: ""
  # OOM remediation used when thorasManageThoras is enabled. Enabled by
  # default so that an OOM on a Thoras workload raises its memory floor via
  # the operator's standard OOM remediation flow. stabilization_window is a
  # duration string (e.g. "1h"); empty defers to the operator default of
  # max(forecast_interval, 1h).
  oom_remediation:
    enabled: true
    stabilization_window: ""
  serviceAccount:
    name: thoras-worker
  podAnnotations: {}
  labels: {}
  # PodDisruptionBudget. Defaults to maxUnavailable: 1 when neither field is set
  # below. minAvailable takes precedence if both are set.
  pdb:
    enabled: false
    maxUnavailable: 1
    # minAvailable:
  service:
    annotations: {}
  replicas: 1
  # Specify the complete resources block (takes precedence if set)
  resources: {}
  # Legacy field for backward compatibility (used if resources is empty)
  limits:
    memory: 4Gi
  # Legacy field for backward compatibility (used if resources is empty)
  requests:
    cpu: 128m
    memory: 1Gi
  logLevel: "info"
  prometheus:
    enabled: true
    port: 9102
  pprof:
    enabled: false
  # Cost will not work in the dashboard if this is disabled. Used for debugging purposes.
  enableAstViewCacheRefreshWorker: true
  enableAstViewCacheStateReconcilerWorker: true
  enableMetricIntegrityWorker: true
  enableDeploymentMonitorWorker: true
  enableUnifiedAstUtilizationMonitor: true
  forecastJobTimeoutInterval: "2m"
  trainJobTimeoutInterval: "10m"
  # Set to true to apply global affinity rules to this component
  useGlobalAffinity: true
  # Component-specific affinity (merged with global if useGlobalAffinity is true)
  affinity: {}
  extraEgressRules: []

thorasDashboard:
  enabled: true
  # Resource upperbound used when thorasManageThoras is enabled. Empty means
  # no upperbound. Use K8s resource.Quantity syntax (e.g. "2", "4Gi").
  upperbound:
    cpu: ""
    memory: ""
  # OOM remediation used when thorasManageThoras is enabled. Enabled by
  # default so that an OOM on a Thoras workload raises its memory floor via
  # the operator's standard OOM remediation flow. stabilization_window is a
  # duration string (e.g. "1h"); empty defers to the operator default of
  # max(forecast_interval, 1h).
  oom_remediation:
    enabled: true
    stabilization_window: ""
  serviceAccount:
    name: thoras-dashboard
    create: true
  rbac:
    create: true
  podAnnotations: {}
  labels: {}
  # PodDisruptionBudget. Defaults to maxUnavailable: 1 when neither field is set
  # below. minAvailable takes precedence if both are set.
  pdb:
    enabled: false
    maxUnavailable: 1
    # minAvailable:
  containerPort: 8080
  # Specify the complete resources block (takes precedence if set)
  resources: {}
  # Legacy field for backward compatibility (used if resources is empty)
  limits:
    memory: 2Gi
  # Legacy field for backward compatibility (used if resources is empty)
  requests:
    cpu: 100m
    memory: 128Mi
  port: 80
  replicas: 1
  service:
    type: ClusterIP
    annotations: {}
  ingress:
    enabled: false
    ingressClassName: "nginx"
    annotations: {}
    hosts:
      - host: thoras.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  gatewayAPI:
    enabled: false
    annotations: {}
    parentRefs:
      - name: gateway
        namespace: default
    hostnames:
      - thoras.local
    path: /
    pathType: PathPrefix
  extras:
    show_savings: true
    cost_analysis: true
    cost_simulator: false
    rolling_savings: true
    cost_breakdown_v2: true
    node_overrides: true
    show_node_details: true
    # Show option in the dashboard to pause scaling cluster wide.
    enable_scaling_pause: true
  # Set to true to apply global affinity rules to this component
  useGlobalAffinity: true
  # Component-specific affinity (merged with global if useGlobalAffinity is true)
  affinity: {}
  extraEgressRules: []

thorasMonitor:
  unittesting: false
  labels: {}
  config: |

thorasForecast:
  serviceAccount:
    name: thoras-forecast-worker
  skipCache: false
  ignoreNewPods: true
  podEligibilityMinRunningTime: "2m"
  enableDecoupledTraining: true
  trainingJitterMinutes: 0
  useAstMetricsSeries: true
  useForecasterComputedMetricId: false
  useForecastEnrichment: false
  # Minimum lookback window required before autonomous scaling is enabled (minimum 3h).
  minLookbackToScale: "3h"
  worker:
    replicas: 1
    # Resource upperbound used when thorasManageThoras is enabled. Empty means
    # no upperbound. Use K8s resource.Quantity syntax (e.g. "2", "4Gi").
    upperbound:
      cpu: "2"
      memory: "4Gi"
    # OOM remediation used when thorasManageThoras is enabled. Enabled by
    # default so that an OOM on the forecast worker raises its memory floor
    # via the operator's standard OOM remediation flow. stabilization_window
    # is a duration string (e.g. "1h"); empty defers to the operator default
    # of max(forecast_interval, 1h).
    oom_remediation:
      enabled: true
      stabilization_window: ""
    pollingInterval: 15
    podAnnotations: {}
    retrainSteadyStateHours: ""
    retrainOverrideHours: ""
    maxTimeseriesMetricCacheSizeMb: 1000
    labels: {}
    # PodDisruptionBudget. Defaults to maxUnavailable: 1 when neither field is
    # set below. minAvailable takes precedence if both are set.
    pdb:
      enabled: false
      maxUnavailable: 1
      # minAvailable:
    # Specify the complete resources block (takes precedence if set)
    resources: {}
    # Legacy field for backward compatibility (used if resources is empty)
    limits:
      memory: 2Gi
      cpu: 2
    # Legacy field for backward compatibility (used if resources is empty)
    requests:
      cpu: 1
      memory: 256Mi
    forecastTimeout: 600
    scaler:
      enabled: true
      interval: "1m"
      minReplicas: 1
      maxReplicas: 100
      astsPerReplica: 67
  prometheus:
    enabled: true
    port: 9101
  service:
    annotations: {}
  # Set to true to apply global affinity rules to this component
  useGlobalAffinity: true
  # Component-specific affinity (merged with global if useGlobalAffinity is true)
  affinity: {}
  extraEgressRules: []

# K8s client max queries per second
queriesPerSecond: "50"

# nodeSelector is used to assign components to specific nodes
nodeSelector: {}

tolerations: []

# Global affinity rules that components can opt into
affinity: {}

# Create Prometheus ServiceMonitors for all Prometheus-enabled components
serviceMonitor:
  enabled: false
  # Scrape interval (e.g. "30s"). If empty, uses Prometheus default.
  interval: ""
  # Additional labels to add to all ServiceMonitors (e.g. for Prometheus discovery)
  additionalLabels: {}

# Global pod annotations applied to all deployments (component podAnnotations override these)
podAnnotations: {}

# Global Labels support
labels: {}

# Flux configuration
flux:
  # Set to true if deploying via Flux to prevent drift detection from reverting
  # operator-initiated rollout restarts.
  enabled: false
  # Field manager name used when patching Kubernetes resources (e.g. restartedAt).
  # Override only if your Flux installation uses a non-default field manager name.
  fieldManager: "flux-client-side-apply"

# Utilization thresholds in which a target is considered over or under provisioned
utilizationThresholds:
  overprovisioned: 60
  underprovisioned: 92
