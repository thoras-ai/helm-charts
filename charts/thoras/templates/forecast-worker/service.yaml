{{- if .Values.thorasForecast.prometheus.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: thoras-forecast-worker
  namespace: {{ .Release.Namespace }}
  {{- with .Values.thorasForecast.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app: thoras-forecast-worker
    {{- include "thoras.resourceLabels" (dict "root" . "component" .Values.thorasForecast.worker.labels) | nindent 4 }}
spec:
  ports:
  - name: http-metrics
    port: {{ .Values.thorasForecast.prometheus.port }}
    protocol: TCP
    targetPort: {{ .Values.thorasForecast.prometheus.port }}
  selector:
    app: thoras-forecast-worker
{{- end }}
