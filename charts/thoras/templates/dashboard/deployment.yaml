---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thoras-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thoras.resourceLabels" (dict "root" . "component" .Values.thorasDashboard.labels) | nindent 4 }}
spec:
  replicas: {{ .Values.thorasDashboard.replicas }}
  selector:
    matchLabels:
      app: thoras-dashboard
  template:
    metadata:
      labels:
        app: thoras-dashboard
        {{- with include "thoras.componentLabels" (dict "root" $ "component" .Values.thorasDashboard.labels) }}
        {{- . | trim | nindent 8 }}
        {{- end }}
      annotations:
        {{- if not .Values.thorasDashboard.unittesting }}
        checksum/configmap: {{ include (print $.Template.BasePath "/dashboard/nginx-config-map.yaml") . | sha256sum }}
        {{- end }}
      {{- with include "thoras.podAnnotations" (dict "root" $ "component" .Values.thorasDashboard.podAnnotations) }}
        {{- . | trim | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.thorasDashboard.serviceAccount.name }}
      {{- if and .Values.imageCredentials.imagePullSecretInDeployment .Values.imageCredentials.secretRef }}
      imagePullSecrets:
      - name: {{ .Values.imageCredentials.secretRef }}
      {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: thoras-dashboard-nginx-config
      containers:
      - image: {{ .Values.imageCredentials.registry }}/thoras-dashboard-v2:{{ default .Values.thorasVersion .Values.thorasDashboard.imageTag }}
        name: thoras-dashboard
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        securityContext:
          runAsUser: 101
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        {{- with include "thoras.globalEnv" . }}
        env:
          {{- . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.thorasDashboard.containerPort }}
          name: http
        {{- if .Values.thorasDashboard.resources }}
        resources: {{ .Values.thorasDashboard.resources | toYaml | nindent 10 }}
        {{- else }}
        resources:
          limits: {{ .Values.thorasDashboard.limits | toYaml | nindent 12 }}
          requests: {{ .Values.thorasDashboard.requests | toYaml | nindent 12 }}
        {{- end }}
        startupProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 5
          failureThreshold: 12
        readinessProbe:
          exec:
            command: ["curl", "-sf", "http://thoras-api-server-v2/health"]
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 5
          failureThreshold: 48
        volumeMounts:
          - name: nginx-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
      {{- if .Values.thorasDashboard.extraContainers }}
      {{- toYaml .Values.thorasDashboard.extraContainers | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.thorasDashboard.useGlobalAffinity }}
        {{- $globalAffinity := .Values.affinity | default dict | deepCopy }}
        {{- $componentAffinity := .Values.thorasDashboard.affinity | default dict | deepCopy }}
        {{- $mergedAffinity := mustMerge dict $globalAffinity $componentAffinity }}
        {{- with $mergedAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
        {{- with .Values.thorasDashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.thorasDashboard.priorityClassName | default .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
