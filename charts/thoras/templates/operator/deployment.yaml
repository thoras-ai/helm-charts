---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "thoras.resourceLabels" (dict "root" . "component" .Values.thorasOperator.labels) | nindent 4 }}
  name: thoras-operator
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.thorasOperator.replicas }}
  selector:
    matchLabels:
      app: thoras-operator
  template:
    metadata:
      labels:
        app: thoras-operator
        {{- with include "thoras.componentLabels" (dict "root" $ "component" .Values.thorasOperator.labels) }}
        {{- . | trim | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.thorasOperator.podAnnotations .Values.thorasOperator.prometheus.enabled }}
      annotations:
        {{- with include "thoras.podAnnotations" (dict "root" $ "component" .Values.thorasOperator.podAnnotations) }}
          {{- . | trim | nindent 8 }}
        {{- end }}
        {{- if .Values.thorasOperator.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.thorasOperator.prometheus.port | quote }}
        {{- end }}
      {{- end }}
      name: thoras-operator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # user: nobody
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.thorasOperator.serviceAccount.name }}
      {{- if and .Values.imageCredentials.imagePullSecretInDeployment .Values.imageCredentials.secretRef }}
      imagePullSecrets:
      - name: {{ .Values.imageCredentials.secretRef }}
      {{- end }}
      volumes:
        - name: system-config
          configMap:
            name: thoras-operator-system-config
        - name: tls
          secret:
            defaultMode: 420
            secretName: thoras-tls-certs
            items:
              - key: cert
                path: tls.crt
              - key: key
                path: tls.key
      initContainers:
      - image: {{ .Values.imageCredentials.registry }}/services:{{ default .Values.thorasVersion .Values.thorasOperator.imageTag }}
        name: wait-for-api-service
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        env:
          - name: API_HEALTH_URL
            value: "http://thoras-api-server-v2/health"
          {{- with include "thoras.globalEnv" . }}{{- . | nindent 10 }}{{- end }}
        command: ["/bin/sh", "-c"]
        args:
          - |
            curl -s --fail-with-body --retry-all-errors --retry 48 --retry-delay 5 ${API_HEALTH_URL}
            if [ $? -ne 0 ]; then
              echo "Failed to connect to API service"
              exit 1
            fi
        resources: {}
      containers:
      - image: {{ .Values.imageCredentials.registry }}/services:{{ default .Values.thorasVersion .Values.thorasOperator.imageTag }}
        name: thoras-operator
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        env:
          - name: SLACK_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
            {{- if and .Values.slackWebhookUrlSecretRefName .Values.slackWebhookUrlSecretRefKey }}
                name: {{ .Values.slackWebhookUrlSecretRefName }}
                key: {{ .Values.slackWebhookUrlSecretRefKey }}
            {{- else }}
                name: thoras-slack
                key: webhookUrl
            {{- end }}
          - name: THORAS_NS
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: SERVICE_SLACK_ERRORS_ENABLED
            value: "{{ .Values.thorasOperator.slackErrorsEnabled | default .Values.slackErrorsEnabled }}"
          - name: SERVICE_SLACK_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
            {{- if and .Values.slackWebhookUrlSecretRefName .Values.slackWebhookUrlSecretRefKey }}
                name: {{ .Values.slackWebhookUrlSecretRefName }}
                key: {{ .Values.slackWebhookUrlSecretRefKey }}
            {{- else }}
                name: thoras-slack
                key: webhookUrl
            {{- end }}
          - name: SERVICE_LOG_LEVEL
            value: {{ default .Values.logLevel .Values.thorasOperator.logLevel }}
          - name: SERVICE_CLUSTER_NAME
            value: "{{ .Values.cluster.name }}"
          - name: SERVICE_THORAS_API_BASE_URL
            value: "http://thoras-api-server-v2"
          - name: FORECAST_IMAGE_PULL_POLICY
            value: "{{ .Values.imagePullPolicy }}"
          - name: MODEL_SKIP_CACHE
            value: "{{ .Values.thorasForecast.skipCache }}"
          - name: SERVICE_QUERIES_PER_SECOND
            value: {{ .Values.thorasOperator.queriesPerSecond | default .Values.queriesPerSecond | quote }}
          {{- with .Values.nodeSelector }}
            {{- $result := list -}}
            {{- range $key, $value := . }}
              {{- $result = append $result (printf "%s:%s" $key $value) }}
            {{- end }}
            {{- $finalString := join "," $result }}
          - name: FORECAST_NODE_SELECTOR
            value: {{ $finalString }}
          {{- end }}
          - name: SERVICE_PORT
            value: {{ .Values.thorasOperator.prometheus.port | quote }}
          {{- with .Values.rbac.namespaces }}
          - name: SERVICE_WATCH_NAMESPACES
            value: {{ join "," . | quote }}
          {{- end }}
          - name: SERVICE_ENABLE_FORECAST_QUEUE_STATS
            value: {{ .Values.featureFlags.enableForecastQueueStats | ternary "true" "false" | quote }}
          - name: SERVICE_MIN_LOOKBACK_TO_SCALE
            value: {{ .Values.thorasForecast.minLookbackToScale | quote }}
          - name: DATABASE_HOST
            valueFrom:
              secretKeyRef:
              {{- if .Values.externalTimescale.secretRefName }}
                name: {{ .Values.externalTimescale.secretRefName }}
                key: {{ .Values.externalTimescale.secretRefKey }}
              {{- else }}
                name: thoras-timescale-password
                key: host
              {{- end }}
          - name: SERVICE_POSTGRESQL_DSN
          {{- if include "thoras.externalTimescaleEnabled" . }}
            value: "$(DATABASE_HOST)"
          {{- else }}
            value: "$(DATABASE_HOST)/thoras"
          {{- end }}
          - name: SERVICE_ENABLE_PROMETHEUS_METRIC_SCRAPING
            value: {{ .Values.featureFlags.enablePrometheusMetricScraping | quote }}
          - name: SERVICE_ENABLE_CLOUD_SYNC
          {{- if (and .Values.cloudSync.baseUrl .Values.cloudSync.clusterKeyID)}}
            value: "true"
          {{- else }}
            value: "false"
          {{- end }}
          {{- if .Values.cloudSync.clusterKeyID }}
          - name: SERVICE_CLOUD_SYNC_CLUSTER_KEY_ID
            value: {{ .Values.cloudSync.clusterKeyID | quote }}
          {{- end }}
          - name: SERVICE_CLOUD_SYNC_BASE_URL
            value: {{ .Values.cloudSync.baseUrl | quote }}
          - name: SERVICE_CLOUD_SYNC_CLUSTER_KEY
            valueFrom:
              secretKeyRef:
            {{- if and .Values.cloudSync.clusterKeySecretRefName .Values.cloudSync.clusterKeySecretRefKey }}
                name: {{ .Values.cloudSync.clusterKeySecretRefName }}
                key: {{ .Values.cloudSync.clusterKeySecretRefKey }}
            {{- else }}
                name: thoras-cloud-sync
                key: clusterKey
            {{- end }}
          {{- if .Values.flux.enabled }}
          - name: SERVICE_FIELD_MANAGER
            value: {{ .Values.flux.fieldManager | quote }}
          {{- end }}
          - name: SERVICE_ENABLE_MIGRATION_ON_START
            value: {{ .Values.featureFlags.enableMigrationOnStartup | ternary "true" "false" | quote }}
          - name: SERVICE_TIMESCALE_EXTENSION_VERSION
            value: {{ .Values.metricsCollector.timescale.extensionVersion | quote }}
          - name: SERVICE_ENABLE_INFORMERS_STRIP_MANAGED_FIELDS
            value: {{ .Values.featureFlags.enableInformersStripManagedFields | ternary "true" "false" | quote }}
          {{- with include "thoras.globalEnv" . }}{{- . | nindent 10 }}{{- end }}
        command: [
          "/app/operator"
        ]
        volumeMounts:
          - name: system-config
            mountPath: /app/system-config.yaml
            subPath: system-config.yaml
            readOnly: true
          - name: tls
            mountPath: /tmp/k8s-webhook-server/serving-certs/tls.crt
            subPath: tls.crt
            readOnly: true
          - name: tls
            mountPath: /tmp/k8s-webhook-server/serving-certs/tls.key
            subPath: tls.key
            readOnly: true
        ports:
          - name: https-web-hooks
            containerPort: 9443
          - name: http-metrics
            containerPort: {{ .Values.thorasOperator.prometheus.port }}
          - name: http-health
            containerPort: 8081
        startupProbe:
          httpGet:
            path: /readyz
            port: http-health
          periodSeconds: 5
          failureThreshold: 60
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-health
          periodSeconds: 5
          failureThreshold: 2
          timeoutSeconds: 2
        {{- if .Values.thorasOperator.resources }}
        resources: {{ .Values.thorasOperator.resources | toYaml | nindent 10 }}
        {{- else }}
        resources:
          limits: {{ .Values.thorasOperator.limits | toYaml | nindent 12 }}
          requests: {{ .Values.thorasOperator.requests | toYaml | nindent 12 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $defaultAffinity := include "thoras.thorasOperator.defaultAffinity" . | fromYaml }}
      {{- if .Values.thorasOperator.useGlobalAffinity }}
        {{- $globalAffinity := .Values.affinity | default dict | deepCopy }}
        {{- $componentAffinity := .Values.thorasOperator.affinity | default dict | deepCopy }}
        {{- $mergedAffinity := mustMerge dict $defaultAffinity $globalAffinity $componentAffinity }}
      affinity:
        {{- toYaml $mergedAffinity | nindent 8 }}
      {{- else }}
        {{- $componentAffinity := .Values.thorasOperator.affinity | default dict | deepCopy }}
        {{- $mergedAffinity := mustMerge dict $defaultAffinity $componentAffinity }}
      affinity:
        {{- toYaml $mergedAffinity | nindent 8 }}
      {{- end }}
