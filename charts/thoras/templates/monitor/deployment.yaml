{{- if .Values.thorasMonitor.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thoras-monitor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thoras.resourceLabels" (dict "root" . "component" .Values.thorasMonitor.labels) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thoras-monitor
  template:
    metadata:
      labels:
        app: thoras-monitor
        {{- with include "thoras.componentLabels" (dict "root" $ "component" .Values.thorasMonitor.labels) }}
        {{- . | trim | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations (not .Values.thorasMonitor.unittesting) .Values.thorasMonitor.podAnnotations }}
      annotations:
        {{- if not .Values.thorasMonitor.unittesting }}
        checksum/configmap: {{ include (print $.Template.BasePath "/monitor/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with include "thoras.podAnnotations" (dict "root" $ "component" .Values.thorasMonitor.podAnnotations) }}
          {{- . | trim | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # user: nobody
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.thorasMonitor.serviceAccount.name }}
      {{- if and .Values.imageCredentials.imagePullSecretInDeployment .Values.imageCredentials.secretRef }}
      imagePullSecrets:
      - name: {{ .Values.imageCredentials.secretRef }}
      {{- end }}
      volumes:
      - name: config
        configMap:
          name: thoras-monitor-config
      containers:
      - name: thoras-monitor
        image: {{ .Values.imageCredentials.registry }}/services:{{ default .Values.thorasVersion .Values.thorasMonitor.imageTag }}
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        command: ["/app/monitor"]
        volumeMounts:
          - name: config
            mountPath: /app/config.yaml
            subPath: config.yaml
            readOnly: true
        env:
          - name: SERVICE_LOG_LEVEL
            value: {{ .Values.thorasMonitor.logLevel | default .Values.thorasMonitor.logLevel | default .Values.logLevel | quote }}
          - name: SERVICE_SLACK_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
            {{- if and .Values.slackWebhookUrlSecretRefName .Values.slackWebhookUrlSecretRefKey }}
                name: {{ .Values.slackWebhookUrlSecretRefName }}
                key: {{ .Values.slackWebhookUrlSecretRefKey }}
            {{- else }}
                name: thoras-slack
                key: webhookUrl
            {{- end }}
          - name: SERVICE_SLACK_ERRORS_ENABLED
            value: "{{ .Values.thorasMonitor.slackErrorsEnabled | default .Values.thorasMonitor.slackErrorsEnabled | default .Values.slackErrorsEnabled }}"
          - name: SERVICE_CLUSTER_NAME
            value: "{{ .Values.cluster.name }}"
          - name: SERVICE_THORAS_API_BASE_URL
            value: "http://thoras-api-server-v2"
          - name: SERVICE_ENABLE_METRIC_INTEGRITY_WORKER
            value: {{ .Values.thorasWorker.enableMetricIntegrityWorker | ternary "true" "false" | quote }}
          - name: SERVICE_ENABLE_DEPLOYMENT_MONITOR_WORKER
            value: {{ .Values.thorasWorker.enableDeploymentMonitorWorker | ternary "true" "false" | quote }}
          - name: SERVICE_CHART_VERSION
            value: {{ .Chart.Version | quote }}
          - name: SERVICE_PLATFORM_VERSION
            value: {{ .Values.thorasVersion | quote }}
          - name: SERVICE_ENABLE_MEMORY_LIMIT
            value: {{ .Values.featureFlags.enableMemoryLimit | ternary "true" "false" | quote }}
          {{- with include "thoras.globalEnv" . }}{{- . | nindent 10 }}{{- end }}
        {{- if .Values.thorasMonitor.resources }}
        resources: {{ .Values.thorasMonitor.resources | toYaml | nindent 10 }}
        {{- else }}
        resources:
          limits: {{ .Values.thorasMonitor.limits | toYaml | nindent 12 }}
          requests: {{ .Values.thorasMonitor.requests | toYaml | nindent 12 }}
        {{- end }}
        readinessProbe:
          exec:
            command: ["curl", "-sf", "http://thoras-api-server-v2/health"]
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 48
        livenessProbe:
          exec:
            command: ["curl", "-sf", "http://thoras-api-server-v2/health"]
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 48
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.thorasMonitor.useGlobalAffinity }}
        {{- $globalAffinity := .Values.affinity | default dict | deepCopy }}
        {{- $componentAffinity := .Values.thorasMonitor.affinity | default dict | deepCopy }}
        {{- $mergedAffinity := mustMerge dict $globalAffinity $componentAffinity }}
        {{- with $mergedAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
        {{- with .Values.thorasMonitor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
{{- end }}
