---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thoras-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thoras.resourceLabels" (dict "root" . "component" .Values.thorasWorker.labels) | nindent 4 }}
  annotations:
    {{- if not .Values.thorasMonitor.unittesting }}
      checksum/configmap: {{ include (print $.Template.BasePath "/monitor/configmap.yaml") . | sha256sum }}
    {{- end }}
spec:
  replicas: {{ .Values.thorasWorker.replicas }}
  selector:
    matchLabels:
      app: thoras-worker
  template:
    metadata:
      labels:
        app: thoras-worker
        {{- with include "thoras.componentLabels" (dict "root" $ "component" .Values.thorasWorker.labels) }}
        {{- . | trim | nindent 8 }}
        {{- end }}
      {{- if or .Values.podAnnotations .Values.thorasWorker.prometheus.enabled .Values.thorasWorker.podAnnotations }}
      annotations:
        {{- if not .Values.thorasMonitor.unittesting }}
        checksum/configmap: {{ include (print $.Template.BasePath "/monitor/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.thorasWorker.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.thorasWorker.prometheus.port | quote }}
        {{- end }}
        {{- with include "thoras.podAnnotations" (dict "root" $ "component" .Values.thorasWorker.podAnnotations) }}
          {{- . | trim | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534 # user: nobody
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.thorasWorker.serviceAccount.name }}
      {{- if and .Values.imageCredentials.imagePullSecretInDeployment .Values.imageCredentials.secretRef }}
      imagePullSecrets:
      - name: {{ .Values.imageCredentials.secretRef }}
      {{- end }}
      volumes:
      - name: monitor-config
        configMap:
          name: thoras-monitor-config
      containers:
      - image: {{ .Values.imageCredentials.registry }}/services:{{ default .Values.thorasVersion .Values.thorasWorker.imageTag }}
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        name: thoras-worker
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        command: ["/app/worker"]
        env:
          - name: DATABASE_HOST
            valueFrom:
              secretKeyRef:
              {{- if .Values.externalTimescale.secretRefName }}
                name: {{ .Values.externalTimescale.secretRefName }}
                key: {{ .Values.externalTimescale.secretRefKey }}
              {{- else }}
                name: thoras-timescale-password
                key: host
              {{- end }}
          - name: SERVICE_POSTGRESQL_DSN
          {{- if include "thoras.externalTimescaleEnabled" . }}
            value: "$(DATABASE_HOST)"
          {{- else }}
            value: "$(DATABASE_HOST)/thoras"
          {{- end }}
          - name: SERVICE_POSTGRESQL_MAX_CONNS
            value: {{ coalesce .Values.thorasWorker.postgresql.maxConns .Values.postgresql.maxConns | quote }}
          - name: SERVICE_POSTGRESQL_MAX_CONN_IDLE_TIME
            value: {{ coalesce .Values.thorasWorker.postgresql.maxConnIdleTime .Values.postgresql.maxConnIdleTime | quote }}
          - name: SERVICE_POSTGRESQL_MAX_CONN_LIFETIME
            value: {{ coalesce .Values.thorasWorker.postgresql.maxConnLifetime .Values.postgresql.maxConnLifetime | quote }}
          - name: SERVICE_SLACK_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
            {{- if and .Values.slackWebhookUrlSecretRefName .Values.slackWebhookUrlSecretRefKey }}
                name: {{ .Values.slackWebhookUrlSecretRefName }}
                key: {{ .Values.slackWebhookUrlSecretRefKey }}
            {{- else }}
                name: thoras-slack
                key: webhookUrl
            {{- end }}
          - name: SERVICE_SLACK_ERRORS_ENABLED
            value: "{{ .Values.thorasWorker.slackErrorsEnabled | default .Values.slackErrorsEnabled }}"
          - name: "SERVICE_LOG_LEVEL"
            value: {{ default .Values.logLevel .Values.thorasWorker.logLevel }}
          - name: SERVICE_CLUSTER_NAME
            value: "{{ .Values.cluster.name }}"
          - name: SERVICE_QUERIES_PER_SECOND
            value: {{ .Values.thorasWorker.queriesPerSecond | default .Values.queriesPerSecond | quote }}
          - name: SERVICE_ENABLE_PPROF
            value: {{ .Values.thorasWorker.pprof.enabled | quote }}
          - name: SERVICE_CHART_VERSION
            value: {{ .Chart.Version | quote }}
          - name: SERVICE_PLATFORM_VERSION
            value: {{ .Values.thorasVersion | quote }}
          {{- with .Values.rbac.namespaces }}
          - name: SERVICE_WATCH_NAMESPACES
            value: {{ join "," . | quote }}
          {{- end }}
          {{- with .Values.thorasWorker.riverLogLevel }}
          - name: SERVICE_RIVER_LOG_LEVEL
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_ENABLE_METRIC_INTEGRITY_WORKER
            value: {{ .Values.thorasWorker.enableMetricIntegrityWorker | ternary "true" "false" | quote }}
          - name: SERVICE_ENABLE_DEPLOYMENT_MONITOR_WORKER
            value: {{ .Values.thorasWorker.enableDeploymentMonitorWorker | ternary "true" "false" | quote }}
          - name: SERVICE_COLLECTOR_MEM_REQUEST
            value: "{{ .Values.metricsCollector.timescale.requests.memory | default "3072Mi" }}"
          - name: SERVICE_PORT
            value: {{ .Values.thorasWorker.prometheus.port | quote }}
          - name: SERVICE_ENABLE_AST_VIEW_CACHE_REFRESH_WORKER
            value: {{ .Values.thorasWorker.enableAstViewCacheRefreshWorker | quote }}
          - name: SERVICE_ENABLE_AST_VIEW_CACHE_STATE_RECONCILER_WORKER
            value: {{ .Values.thorasWorker.enableAstViewCacheStateReconcilerWorker | quote }}
          - name: SERVICE_ENABLE_COST_REFRESH_BATCHING
            value: {{ .Values.costRefreshBatching.enabled | ternary "true" "false" | quote }}
          - name: SERVICE_COST_REFRESH_BATCH_SIZE
            value: {{ .Values.costRefreshBatching.batchSize | quote }}
          - name: SERVICE_COST_REFRESH_MAX_CONCURRENCY
            value: {{ .Values.costRefreshBatching.maxConcurrency | quote }}
          - name: SERVICE_ENABLE_UNIFIED_AST_UTILIZATION_MONITOR
            value: {{ .Values.thorasWorker.enableUnifiedAstUtilizationMonitor | ternary "true" "false" | quote }}
          - name: SERVICE_ENABLE_PROMETHEUS_METRIC_SCRAPING
            value: {{ .Values.featureFlags.enablePrometheusMetricScraping | quote }}
          - name: SERVICE_ENABLE_CLOUD_SYNC_WORKER
          {{- if (and .Values.cloudSync.baseUrl .Values.cloudSync.clusterKeyID)}}
            value: "true"
          {{- else }}
            value: "false"
          {{- end }}
          - name: SERVICE_CLOUD_SYNC_CLUSTER_KEY_ID
            value: {{ .Values.cloudSync.clusterKeyID | quote }}
          - name: SERVICE_CLOUD_SYNC_BASE_URL
            value: {{ .Values.cloudSync.baseUrl | quote }}
          - name: SERVICE_CLOUD_SYNC_CLUSTER_KEY
            valueFrom:
              secretKeyRef:
            {{- if and .Values.cloudSync.clusterKeySecretRefName .Values.cloudSync.clusterKeySecretRefKey }}
                name: {{ .Values.cloudSync.clusterKeySecretRefName }}
                key: {{ .Values.cloudSync.clusterKeySecretRefKey }}
            {{- else }}
                name: thoras-cloud-sync
                key: clusterKey
            {{- end }}
          - name: SERVICE_POD_ELIGIBILITY_MIN_RUNNING_TIME
            value: "{{ .Values.thorasForecast.podEligibilityMinRunningTime }}"
          - name: SERVICE_ENABLE_NODE_DETAILS_COLLECTOR
            value: {{ .Values.featureFlags.enableNodeDetailsCollector | ternary "true" "false" | quote}}
          - name: SERVICE_ENABLE_CHECK_DATABASE_HEALTH
            value: "true"
          - name: SERVICE_ENABLE_FORECAST_QUEUE_STATS
            value: {{ not .Values.featureFlags.enableForecastQueueStats | ternary "true" "false" | quote }}
          - name: SERVICE_FORECAST_JOB_TIMEOUT_INTERVAL
            value: {{ .Values.thorasWorker.forecastJobTimeoutInterval | quote }}
          - name: SERVICE_TRAIN_JOB_TIMEOUT_INTERVAL
            value: {{ .Values.thorasWorker.trainJobTimeoutInterval | quote }}
          - name: SERVICE_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: SERVICE_SHOULD_MIGRATE_ON_START
            value: "true"
          - name: SERVICE_TIMESCALE_EXTENSION_VERSION
            value: {{ .Values.metricsCollector.timescale.extensionVersion | quote }}
          - name: SERVICE_ENABLE_INFORMERS_STRIP_MANAGED_FIELDS
            value: {{ .Values.featureFlags.enableInformersStripManagedFields | ternary "true" "false" | quote }}
          - name: SERVICE_ENABLE_TYPED_INFORMERS
            value: {{ .Values.featureFlags.enableTypedInformers | ternary "true" "false" | quote }}
          - name: SERVICE_ENABLE_MEMORY_LIMIT
            value: {{ .Values.featureFlags.enableMemoryLimit | ternary "true" "false" | quote }}
          - name: SERVICE_OVERPROVISIONED_THRESHOLD
            value: {{ .Values.utilizationThresholds.overprovisioned | quote }}
          - name: SERVICE_UNDERPROVISIONED_THRESHOLD
            value: {{ .Values.utilizationThresholds.underprovisioned | quote }}
          - name: SERVICE_ENABLE_THORAS_SCALING_THORAS_WORKER
            value: {{ .Values.featureFlags.thorasManageThoras.enabled | ternary "true" "false" | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_MODE
            value: {{ .Values.featureFlags.thorasManageThoras.mode | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_UPDATE_MODE
            value: {{ .Values.featureFlags.thorasManageThoras.updateMode | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_DATABASE_UPDATE_MODE
            value: {{ .Values.featureFlags.thorasManageThoras.db.updateMode | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_DATABASE_FORECAST_BLOCKS
            value: {{ .Values.featureFlags.thorasManageThoras.db.forecastBlocks | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_DATABASE_FORECAST_CRON
            value: {{ .Values.featureFlags.thorasManageThoras.db.forecastCron | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_FORECAST_WORKER_CPU_UPPER_BOUND
            value: {{ .Values.thorasForecast.worker.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_FORECAST_WORKER_MEMORY_UPPER_BOUND
            value: {{ .Values.thorasForecast.worker.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_API_SERVER_CPU_UPPER_BOUND
            value: {{ .Values.thorasApiServerV2.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_API_SERVER_MEMORY_UPPER_BOUND
            value: {{ .Values.thorasApiServerV2.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_DASHBOARD_CPU_UPPER_BOUND
            value: {{ .Values.thorasDashboard.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_DASHBOARD_MEMORY_UPPER_BOUND
            value: {{ .Values.thorasDashboard.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_MONITOR_CPU_UPPER_BOUND
            value: {{ .Values.thorasMonitor.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_MONITOR_MEMORY_UPPER_BOUND
            value: {{ .Values.thorasMonitor.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_OPERATOR_CPU_UPPER_BOUND
            value: {{ .Values.thorasOperator.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_OPERATOR_MEMORY_UPPER_BOUND
            value: {{ .Values.thorasOperator.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_WORKER_CPU_UPPER_BOUND
            value: {{ .Values.thorasWorker.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_WORKER_MEMORY_UPPER_BOUND
            value: {{ .Values.thorasWorker.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_METRICS_COLLECTOR_CPU_UPPER_BOUND
            value: {{ .Values.metricsCollector.upperbound.cpu | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_METRICS_COLLECTOR_MEMORY_UPPER_BOUND
            value: {{ .Values.metricsCollector.upperbound.memory | quote }}
          - name: SERVICE_THORAS_SCALING_THORAS_FORECAST_WORKER_OOM_REMEDIATION_ENABLED
            value: {{ .Values.thorasForecast.worker.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.thorasForecast.worker.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_FORECAST_WORKER_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_THORAS_SCALING_THORAS_API_SERVER_OOM_REMEDIATION_ENABLED
            value: {{ .Values.thorasApiServerV2.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.thorasApiServerV2.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_API_SERVER_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_THORAS_SCALING_THORAS_DASHBOARD_OOM_REMEDIATION_ENABLED
            value: {{ .Values.thorasDashboard.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.thorasDashboard.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_DASHBOARD_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_THORAS_SCALING_THORAS_MONITOR_OOM_REMEDIATION_ENABLED
            value: {{ .Values.thorasMonitor.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.thorasMonitor.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_MONITOR_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_THORAS_SCALING_THORAS_OPERATOR_OOM_REMEDIATION_ENABLED
            value: {{ .Values.thorasOperator.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.thorasOperator.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_OPERATOR_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_THORAS_SCALING_THORAS_WORKER_OOM_REMEDIATION_ENABLED
            value: {{ .Values.thorasWorker.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.thorasWorker.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_WORKER_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_THORAS_SCALING_THORAS_METRICS_COLLECTOR_OOM_REMEDIATION_ENABLED
            value: {{ .Values.metricsCollector.oom_remediation.enabled | ternary "true" "false" | quote }}
          {{- with .Values.metricsCollector.oom_remediation.stabilization_window }}
          - name: SERVICE_THORAS_SCALING_THORAS_METRICS_COLLECTOR_OOM_REMEDIATION_STABILIZATION_WINDOW
            value: {{ . | quote }}
          {{- end }}
          - name: SERVICE_ENABLE_FORECAST_WORKER_SCALER
            value: {{ .Values.thorasForecast.worker.scaler.enabled | ternary "true" "false" | quote }}
          - name: SERVICE_FORECAST_WORKER_SCALER_INTERVAL
            value: {{ .Values.thorasForecast.worker.scaler.interval | quote }}
          - name: SERVICE_FORECAST_WORKER_DEPLOYMENT_NAME
            value: "thoras-forecast-worker"
          - name: SERVICE_FORECAST_WORKER_DEPLOYMENT_NAMESPACE
            value: {{ .Release.Namespace | quote }}
          - name: SERVICE_FORECAST_WORKER_MIN_REPLICAS
            value: {{ .Values.thorasForecast.worker.scaler.minReplicas | quote }}
          - name: SERVICE_FORECAST_WORKER_MAX_REPLICAS
            value: {{ .Values.thorasForecast.worker.scaler.maxReplicas | quote }}
          - name: SERVICE_FORECAST_WORKER_ASTS_PER_REPLICA
            value: {{ .Values.thorasForecast.worker.scaler.astsPerReplica | quote }}
          - name: SERVICE_ENABLE_DISRUPTION_SCHEDULER_WORKER
            value: {{ .Values.featureFlags.enableDisruptionSchedulerWorker | ternary "true" "false" | quote }}
          {{- with include "thoras.globalEnv" . }}{{- . | nindent 10 }}{{- end }}
        ports:
          - name: http-metrics
            containerPort: {{ .Values.thorasWorker.prometheus.port }}
        startupProbe:
          httpGet:
            path: /health
            port: http-metrics
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /health
            port: http-metrics
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /health
            port: http-metrics
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 2
        {{- if .Values.thorasWorker.resources }}
        resources: {{ .Values.thorasWorker.resources | toYaml | nindent 10 }}
        {{- else }}
        resources:
          limits: {{ .Values.thorasWorker.limits | toYaml | nindent 12 }}
          requests: {{ .Values.thorasWorker.requests | toYaml | nindent 12 }}
        {{- end }}
        volumeMounts:
        - name: monitor-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.thorasWorker.useGlobalAffinity }}
        {{- $globalAffinity := .Values.affinity | default dict | deepCopy }}
        {{- $componentAffinity := .Values.thorasWorker.affinity | default dict | deepCopy }}
        {{- $mergedAffinity := mustMerge dict $globalAffinity $componentAffinity }}
        {{- with $mergedAffinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- else }}
        {{- with .Values.thorasWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
